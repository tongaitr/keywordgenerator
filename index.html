<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Keyword Generator (Thailand)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Prompt', sans-serif;
        }
        /* Custom scrollbar for textareas */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 selection:bg-blue-200">

    <div class="max-w-4xl mx-auto pt-10 pb-20 px-4 sm:px-6">
        
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                เครื่องมือสร้างคีย์เวิร์ด SEO อัจฉริยะ
            </h1>
            <p class="text-slate-500 text-sm md:text-base max-w-2xl mx-auto">
                ค้นหาไอเดียคีย์เวิร์ดที่ใช่ อ้างอิงจาก Google.co.th, Search Intent และ Google Trends <br class="hidden sm:block">
                วิเคราะห์บริบทภาษาไทย แนะนำ 10 คีย์เวิร์ดเด็ด พร้อมนำไปใช้งานทันที
            </p>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 p-6 md:p-8 border border-slate-100">
            
            <!-- Input Section -->
            <div class="mb-8">
                <label for="keywordInput" class="block text-sm font-semibold text-slate-700 mb-2">คำค้นหาหลัก (Seed Keyword)</label>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="keywordInput" placeholder="เช่น คาเฟ่เชียงใหม่, รองเท้าวิ่ง, วิธีลดน้ำหนัก..." 
                        class="flex-1 w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-slate-700 placeholder-slate-400">
                    <button id="generateBtn" onclick="generateKeywords()" 
                        class="w-full sm:w-auto px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2 whitespace-nowrap">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" />
                        </svg>
                        สร้างคีย์เวิร์ด
                    </button>
                </div>
                <p id="errorMessage" class="text-red-500 text-sm mt-2 hidden"></p>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="hidden flex-col items-center justify-center py-12">
                <div class="loader border-4 border-slate-100 rounded-full w-12 h-12 mb-4"></div>
                <p class="text-slate-500 font-medium animate-pulse">กำลังวิเคราะห์ข้อมูลจาก Google...</p>
            </div>

            <!-- Results Section -->
            <div id="resultsSection" class="hidden space-y-6 animate-[fadeIn_0.5s_ease-out]">
                
                <hr class="border-slate-100">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Format 1: Comma Separated -->
                    <div class="bg-slate-50 rounded-xl p-5 border border-slate-200">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd" />
                                </svg>
                                แบบคั่นด้วยลูกน้ำ
                            </h3>
                            <button onclick="copyText('resultComma')" class="text-xs px-3 py-1.5 bg-white border border-slate-300 rounded-lg hover:bg-slate-100 text-slate-600 transition-colors flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                                    <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                                </svg>
                                คัดลอก
                            </button>
                        </div>
                        <textarea id="resultComma" readonly class="w-full h-32 bg-transparent text-slate-600 resize-none outline-none leading-relaxed" placeholder="ผลลัพธ์จะแสดงที่นี่..."></textarea>
                    </div>

                    <!-- Format 2: Hashtags -->
                    <div class="bg-slate-50 rounded-xl p-5 border border-slate-200">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M9.243 3.03a1 1 0 01.727 1.213L9.53 6h2.94l.56-2.243a1 1 0 111.94.486L14.53 6H17a1 1 0 110 2h-2.97l-1 4H15a1 1 0 110 2h-2.47l-.56 2.242a1 1 0 11-1.94-.485L10.47 14H7.53l-.56 2.242a1 1 0 11-1.94-.485L5.47 14H3a1 1 0 110-2h2.97l1-4H5a1 1 0 110-2h2.47l.56-2.243a1 1 0 011.213-.727zM9.03 8l-1 4h2.938l1-4H9.031z" clip-rule="evenodd" />
                                </svg>
                                แบบแฮชแท็ก
                            </h3>
                            <button onclick="copyText('resultHashtag')" class="text-xs px-3 py-1.5 bg-white border border-slate-300 rounded-lg hover:bg-slate-100 text-slate-600 transition-colors flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                                    <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                                </svg>
                                คัดลอก
                            </button>
                        </div>
                        <textarea id="resultHashtag" readonly class="w-full h-32 bg-transparent text-slate-600 resize-none outline-none leading-relaxed" placeholder="ผลลัพธ์จะแสดงที่นี่..."></textarea>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Toast Notification (Hidden by default) -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg shadow-green-500/30 flex items-center gap-3 z-50 pointer-events-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        <span class="font-medium">คัดลอกเรียบร้อยแล้ว!</span>
    </div>

    <script>
        // API Key is automatically provided by the environment
        const apiKey = "";
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

        // Add event listener for Enter key in input field
        document.getElementById('keywordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                generateKeywords();
            }
        });

        async function fetchWithRetry(url, payload, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (e) {
                    if (i === maxRetries - 1) throw e;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function generateKeywords() {
            const inputEl = document.getElementById('keywordInput');
            const keyword = inputEl.value.trim();
            const errorEl = document.getElementById('errorMessage');
            const loadingEl = document.getElementById('loadingState');
            const resultsEl = document.getElementById('resultsSection');
            const btnEl = document.getElementById('generateBtn');

            // Reset UI
            errorEl.classList.add('hidden');
            resultsEl.classList.add('hidden');
            
            if (!keyword) {
                errorEl.textContent = 'กรุณาพิมพ์คำค้นหาหลัก (Seed Keyword) ก่อนคลิกสร้าง';
                errorEl.classList.remove('hidden');
                inputEl.focus();
                return;
            }

            // Show loading
            loadingEl.classList.remove('hidden');
            loadingEl.classList.add('flex');
            btnEl.disabled = true;
            btnEl.classList.add('opacity-70', 'cursor-not-allowed');

            // Construct Prompt for Gemini
            const systemPrompt = `คุณคือผู้เชี่ยวชาญด้าน SEO ในประเทศไทย หน้าที่ของคุณคือสร้างคีย์เวิร์ด (Keywords) ที่เกี่ยวข้องกับคำค้นหาที่ผู้ใช้ระบุ โดยต้องเป็นคีย์เวิร์ดที่มีแนวโน้มการค้นหาจริงใน Google.co.th, ตรงกับ Search Intent ของคนไทย และอ้างอิงจากลักษณะคำค้นหาใน Google Trends 
            ข้อบังคับ:
            1. ให้แนะนำมาทั้งหมด 10 คีย์เวิร์ด
            2. ห้ามมีคำอธิบายเพิ่มเติมใดๆ
            3. ต้องตอบกลับในรูปแบบ JSON Array ของ String เท่านั้น`;

            const userPrompt = `จงสร้าง 10 คีย์เวิร์ดที่เกี่ยวข้องกับคำว่า "${keyword}"`;

            const payload = {
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "ARRAY",
                        items: { type: "STRING" }
                    }
                }
            };

            try {
                const result = await fetchWithRetry(apiUrl, payload);
                
                // Parse the response
                let keywords = [];
                const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (responseText) {
                    keywords = JSON.parse(responseText);
                }

                if (!Array.isArray(keywords) || keywords.length === 0) {
                    throw new Error("รูปแบบข้อมูลที่ได้รับไม่ถูกต้อง");
                }

                // Format 1: Comma separated
                const commaFormat = keywords.join(', ');
                
                // Format 2: Hashtag separated (Remove spaces for valid hashtags)
                const hashtagFormat = keywords.map(kw => '#' + kw.replace(/\s+/g, '')).join(', ');

                // Update UI
                document.getElementById('resultComma').value = commaFormat;
                document.getElementById('resultHashtag').value = hashtagFormat;

                // Show Results
                loadingEl.classList.add('hidden');
                loadingEl.classList.remove('flex');
                resultsEl.classList.remove('hidden');

            } catch (error) {
                console.error("API Error:", error);
                loadingEl.classList.add('hidden');
                loadingEl.classList.remove('flex');
                errorEl.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์ กรุณาลองใหม่อีกครั้ง';
                errorEl.classList.remove('hidden');
            } finally {
                btnEl.disabled = false;
                btnEl.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        function copyText(elementId) {
            const textAreaToCopy = document.getElementById(elementId);
            const textToCopy = textAreaToCopy.value;

            if (!textToCopy) return;

            // Use the fallback approach which is safer in cross-origin iframes
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = textToCopy;
            // Prevent scrolling to bottom
            tempTextArea.style.top = "0";
            tempTextArea.style.left = "0";
            tempTextArea.style.position = "fixed";
            document.body.appendChild(tempTextArea);
            tempTextArea.focus();
            tempTextArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast();
                } else {
                    console.error('Fallback copy failed');
                }
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }

            document.body.removeChild(tempTextArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            // Hide after 3 seconds
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
